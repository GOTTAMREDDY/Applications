version: "3.9"

networks:
  default:
    external:
      name: roboshop

volumes:
  mongodb:
  redis:
  mysql:
  rabbitmq:

services:

  # -------------------------
  # MongoDB
  # -------------------------
  mongodb:
    build:
      context: ./mongoDB
      dockerfile: Dockerfile
      target: runtime  # optional if multi-stage
    container_name: mongodb
    volumes:
      - mongodb:/data/db
    networks:
      - default

  # -------------------------
  # Catalogue
  # -------------------------
  catalogue:
    build:
      context: ./catalogue
      dockerfile: Dockerfile
    container_name: catalogue
    depends_on:
      - mongodb
    networks:
      - default

  # -------------------------
  # Web (Nginx)
  # -------------------------
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: web
    ports:
      - "80:80"
    depends_on:
      - catalogue
      - cart
      - user
      - shipping
      - payment
    networks:
      - default

  # -------------------------
  # Redis
  # -------------------------
  redis:
    image: redis
    container_name: redis
    volumes:
      - redis:/data
    networks:
      - default

  # -------------------------
  # User
  # -------------------------
  user:
    build:
      context: ./user
      dockerfile: Dockerfile
    container_name: user
    depends_on:
      - redis
      - mongodb
    networks:
      - default

  # -------------------------
  # Cart
  # -------------------------
  cart:
    build:
      context: ./cart
      dockerfile: Dockerfile
    container_name: cart
    depends_on:
      - redis
      - catalogue
    networks:
      - default

  # -------------------------
  # MySQL
  # -------------------------
  mysql:
    build:
      context: ./mysql
      dockerfile: Dockerfile
    container_name: mysql
    volumes:
      - mysql:/var/lib/mysql
    networks:
      - default

  # -------------------------
  # Shipping
  # -------------------------
  shipping:
    build:
      context: ./shipping
      dockerfile: Dockerfile
    container_name: shipping
    depends_on:
      - mysql
    networks:
      - default

  # -------------------------
  # RabbitMQ
  # -------------------------
  rabbitmq:
    image: rabbitmq
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: roboshop123
    volumes:
      - rabbitmq:/var/lib/rabbitmq
    networks:
      - default

  # -------------------------
  # Payment
  # -------------------------
  payment:
    build:
      context: ./payment
      dockerfile: Dockerfile
    container_name: payment
    depends_on:
      - rabbitmq
      - user
      - cart
    networks:
      - default