version: "3.9"

networks:
  default:
    external:
      name: roboshop

volumes:
  mongodb:
  redis:
  mysql:
  rabbitmq:

services:

  # -------------------------
  # MongoDB
  # -------------------------
  mongodb:
    build: ./MongoDB
    container_name: mongodb
    volumes:
      - mongodb:/data/db
    networks:
      - default

  # -------------------------
  # Catalogue
  # -------------------------
  catalogue:
    build: ./Catalogue   
    container_name: catalogue
    depends_on:
      - mongodb
    networks:
      - default

  # -------------------------
  # Web (Nginx)
  # -------------------------
  web:
    build: ./Web
    container_name: web
    ports:
      - "80:80"
    depends_on:
      - catalogue
      - cart
      - user
      - shipping
      - payment
    networks:
      - default

  # -------------------------
  # Redis
  # -------------------------
  redis:
    image: redis
    container_name: redis
    volumes:
      - redis:/data
    networks:
      - default

  # -------------------------
  # User
  # -------------------------
  user:
    build: ./User
    container_name: user
    depends_on:
      - redis
      - mongodb
    networks:
      - default

  # -------------------------
  # Cart
  # -------------------------
  cart:
    build: ./Cart
    container_name: cart
    depends_on:
      - redis
      - catalogue
    networks:
      - default

  # -------------------------
  # MySQL
  # -------------------------
  mysql:
    build: ./Mysql
    container_name: mysql
    volumes:
      - mysql:/var/lib/mysql
    networks:
      - default

  # -------------------------
  # Shipping
  # -------------------------
  shipping:
    build: ./Shipping
    container_name: shipping
    depends_on:
      - mysql
    networks:
      - default

  # -------------------------
  # RabbitMQ
  # -------------------------
  rabbitmq:
    image: rabbitmq
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: roboshop123
    volumes:
      - rabbitmq:/var/lib/rabbitmq
    networks:
      - default

  # -------------------------
  # Payment
  # -------------------------
  payment:
    build: ./Payment
    container_name: payment
    depends_on:
      - rabbitmq
      - user
      - cart
    networks:
      - default